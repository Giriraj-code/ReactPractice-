<!DOCTYPE html>
<html>
<head>
  <title>Q14 Nav Menu</title>
  <style>
    ul {
      list-style: none;
      background: #333;
      padding: 0;
      display: flex;
    }

    ul li {
      position: relative;
    }

    ul li a {
      display: block;
      color: white;
      padding: 14px 18px;
      text-decoration: none;
    }

    ul li a:hover {
      background: #555;
    }

    ul li ul {
      display: none;
      position: absolute;
      background: #444;
      top: 100%;
    }

    ul li:hover ul {
      display: block;
    }

    ul li ul li a {
      padding: 10px 16px;
    }
  </style>
</head>
<body>

  <ul>
    <li><a href="#">Home</a></li>
    <li>
      <a href="#">Courses</a>
      <ul>
        <li><a href="#">MCA</a></li>
        <li><a href="#">BCA</a></li>
        <li><a href="#">BSc CS</a></li>
      </ul>
    </li>
    <li>
      <a href="#">Department</a>
      <ul>
        <li><a href="#">Faculty</a></li>
        <li><a href="#">Labs</a></li>
      </ul>
    </li>
    <li><a href="#">Contact</a></li>
  </ul>

  <p style="margin-top: 20px;">Hover on Courses or Department to see dropdown.</p>

</body>
</html>
