<!DOCTYPE html>
<html>
<head>
  <title>Q1 Fade In Fade Out</title>
</head>
<body>

  <p id="text">Hello World!</p>
  <button id="btn1">Fade Out</button>
  <button id="btn2">Fade In</button>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $("#btn1").click(function() {
      $("#text").fadeOut();
    });

    $("#btn2").click(function() {
      $("#text").fadeIn();
    });
  </script>

</body>
</html>
