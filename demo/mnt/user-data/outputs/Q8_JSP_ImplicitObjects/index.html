<!DOCTYPE html>
<html>
<head>
  <title>Q8 JSP Implicit Objects</title>
</head>
<body>

  <h2>JSP Implicit Objects</h2>

  <p><b>request.getMethod():</b> GET</p>
  <p><b>request.getRequestURI():</b> /implicit.jsp</p>
  <p><b>session.getAttribute("user"):</b> Rahul</p>
  <p><b>application.getServerInfo():</b> Apache Tomcat/10.1</p>
  <p><b>out.println():</b> Writing using out object</p>

  <!--
  JSP CODE (implicit.jsp) - Run on Tomcat:

  <%@ page language="java" contentType="text/html; charset=UTF-8" %>
  <%
    session.setAttribute("user", "Rahul");
    String user   = (String) session.getAttribute("user");
    String method = request.getMethod();
    String uri    = request.getRequestURI();
  %>
  <p>request.getMethod()      : <%= method %></p>
  <p>request.getRequestURI()  : <%= uri %></p>
  <p>session user             : <%= user %></p>
  <p>Server Info              : <%= application.getServerInfo() %></p>
  <% out.println("<p>Written using out.println()</p>"); %>
  -->

</body>
</html>
