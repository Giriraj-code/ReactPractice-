<!DOCTYPE html>
<html>
<head>
  <title>Q5 - jQuery Event Handling</title>
</head>
<body>
  <button id="btn1">Click</button>
  <button id="btn2">Double Click</button>
  <button id="btn3">Hover Me</button>
  <button id="btn4">One Time</button>
  <p id="msg"></p>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $("#btn1").click(function() {
      $("#msg").text("Button Clicked!");
    });

    $("#btn2").dblclick(function() {
      $("#msg").text("Double Clicked!");
    });

    $("#btn3").mouseover(function() {
      $("#msg").text("Mouse Over!");
    }).mouseout(function() {
      $("#msg").text("Mouse Out!");
    });

    $("#btn4").one("click", function() {
      $("#msg").text("This fires only once!");
    });
  </script>
</body>
</html>
