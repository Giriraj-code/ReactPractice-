<!DOCTYPE html>
<html>
<head>
  <title>Q9 - My Info</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 50px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    h1 { color: #2c3e50; }
    p { color: #555; font-size: 16px; }
    button {
      margin-top: 15px;
      padding: 8px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #info { display: none; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Student Profile</h1>
    <button id="showBtn">Show My Details</button>
    <div id="info">
      <p><b>Name:</b> Rahul Sharma</p>
      <p><b>Course:</b> MCA</p>
      <p><b>Favorite Subject:</b> Web Technology</p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $("#showBtn").click(function() {
      $("#info").slideToggle(500);
      $(this).text($("#info").is(":visible") ? "Hide Details" : "Show My Details");
    });
  </script>
</body>
</html>
